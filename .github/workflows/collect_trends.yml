name: Collect Google Trends (36m)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run collection script
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_TAB: ${{ secrets.GOOGLE_SHEETS_TAB }}
          GOOGLE_SHEETS_WRITE_MODE: ${{ secrets.GOOGLE_SHEETS_WRITE_MODE }}
        run: |
          python scripts/collect_trends.py
      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: google_trends_36m
          path: output/google_trends_36m.csv
          if-no-files-found: error
          retention-days: 14